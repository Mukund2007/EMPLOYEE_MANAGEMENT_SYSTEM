spring.application.name=backend
server.port=${PORT:8080}

# For Render: DB_URL = jdbc:mysql://<host>:<port>/ems
# SSL is handled programmatically in DataSourceConfig.java — no SSL params needed in the URL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:changeme-local-dev-only}
jwt.expiration=86400000

logging.level.com.ems=INFO
logging.level.com.zaxxer.hikari=DEBUG

