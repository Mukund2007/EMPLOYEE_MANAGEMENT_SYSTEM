spring.application.name=backend
server.port=${PORT:8080}

# DB_URL should include: ?sslMode=REQUIRE&tlsVersions=TLSv1.2&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Force TLS 1.2 for Aiven cloud MySQL (Aiven rejects TLS 1.0/1.1)
spring.datasource.hikari.data-source-properties.enabledTLSProtocols=TLSv1.2
spring.datasource.hikari.data-source-properties.useSSL=true
spring.datasource.hikari.data-source-properties.requireSSL=true

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:changeme-local-dev-only}
jwt.expiration=86400000

logging.level.com.ems=INFO
logging.level.com.zaxxer.hikari=DEBUG
